pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,js,mjs,vue}"
      run: bun run lint:staged -- {staged_files}
    typecheck:
      run: bun run typecheck

pre-push:
  commands:
    typescript-quality:
      run: bun run check:ts

