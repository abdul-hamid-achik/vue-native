name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ── TypeScript (lint, typecheck, build, test) ───────────
  typescript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test:ts

      - name: Dead code check
        run: bun run knip

  # ── Swift / iOS (build & test VueNativeCore) ───────────
  swift-ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            native/ios/VueNativeCore/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('native/ios/VueNativeCore/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift
        run: |
          cd native/ios
          swiftlint lint --reporter github-actions-logging

      - name: Build VueNativeCore for iOS Simulator
        run: |
          cd native/ios/VueNativeCore
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Test VueNativeCore
        run: |
          cd native/ios/VueNativeCore
          xcodebuild test \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult

  # ── Swift / macOS (build & test VueNativeShared + VueNativeMacOS) ──
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            native/shared/VueNativeShared/.build
            native/macos/VueNativeMacOS/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('native/shared/VueNativeShared/Package.swift', 'native/macos/VueNativeMacOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift build

      - name: Test VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift test

      - name: Build VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift build

      - name: Test VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift test

  # ── Kotlin / Android (build & test VueNativeCore) ───────────
  kotlin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('native/android/build.gradle.kts', 'native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Lint Kotlin
        run: ./gradlew :VueNativeCore:ktlintCheck
        working-directory: native/android

      - name: Build VueNativeCore
        run: ./gradlew :VueNativeCore:assembleRelease
        working-directory: native/android

      - name: Test VueNativeCore
        run: ./gradlew :VueNativeCore:testReleaseUnitTest
        working-directory: native/android

  # ── Visual report for PRs ──────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [typescript, swift-ios, swift-macos, kotlin]
    if: always()

    steps:
      - name: CI Summary
        run: |
          echo "## CI Results"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| TypeScript | ${{ needs.typescript.result }} |"
          echo "| Swift iOS | ${{ needs.swift-ios.result }} |"
          echo "| Swift macOS | ${{ needs.swift-macos.result }} |"
          echo "| Kotlin | ${{ needs.kotlin.result }} |"
