name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ── TypeScript (lint, typecheck, build, test) ───────────
  typescript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache node_modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.8-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.8-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Native module contract check
        run: bun run contracts:check

      - name: Build
        run: bun run build

      - name: Smoke-test packed CLI scaffold
        run: bun run smoke:cli

      - name: Test
        run: bun run test:ts

      - name: Dead code check
        run: bun run knip

      - name: Validate Git hooks
        run: bun run hooks:validate

  # ── Swift / iOS (build & test VueNativeCore) ───────────
  swift-ios:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
            native/ios/VueNativeCore/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'native/ios/VueNativeCore/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift
        run: |
          cd native/ios
          swiftlint lint --strict --reporter github-actions-logging

      - name: Build VueNativeCore for iOS Simulator (in-repo package)
        run: |
          cd native/ios/VueNativeCore
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Validate root Package.swift (consumer-facing SPM target)
        run: |
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Test VueNativeCore
        run: |
          SIMULATOR_ID="$(
            xcrun simctl list devices available -j |
              python3 -c 'import json, sys; devices = json.load(sys.stdin)["devices"].values(); phones = (device for runtime in devices for device in runtime if device.get("isAvailable") and device["name"].startswith("iPhone")); print(next(phones)["udid"])'
          )"
          cd native/ios/VueNativeCore
          xcodebuild test \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -skipPackagePluginValidation \
            -resultBundlePath TestResults.xcresult

  # ── Swift / macOS (build & test VueNativeShared + VueNativeMacOS) ──
  swift-macos:
    name: Swift (macOS)
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - name: Cache Swift packages
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            native/shared/VueNativeShared/.build
            native/macos/VueNativeMacOS/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('native/shared/VueNativeShared/Package.swift', 'native/macos/VueNativeMacOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift build

      - name: Test VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift test

      - name: Validate root VueNativeMacOS product
        run: swift build --target VueNativeMacOS

      - name: Build VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift build

      - name: Test VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift test

  # ── Kotlin / Android (build & test VueNativeCore) ───────────
  kotlin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('native/android/build.gradle.kts', 'native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Lint Kotlin
        run: ./gradlew :VueNativeCore:ktlintCheck
        working-directory: native/android

      - name: Build VueNativeCore
        run: ./gradlew :VueNativeCore:compileDebugKotlin :VueNativeCore:assembleRelease
        working-directory: native/android

      - name: Test VueNativeCore
        run: ./gradlew :VueNativeCore:testDebugUnitTest :VueNativeCore:testReleaseUnitTest
        working-directory: native/android

  # ── Aggregate required checks ──────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [typescript, swift-ios, swift-macos, kotlin]
    if: always()

    steps:
      - name: CI Summary
        run: |
          {
            echo "## CI Results"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| TypeScript | ${{ needs.typescript.result }} |"
            echo "| Swift iOS | ${{ needs.swift-ios.result }} |"
            echo "| Swift macOS | ${{ needs.swift-macos.result }} |"
            echo "| Kotlin | ${{ needs.kotlin.result }} |"
          } | tee -a "$GITHUB_STEP_SUMMARY"

          if [[ "${{ needs.typescript.result }}" != "success" || \
                "${{ needs.swift-ios.result }}" != "success" || \
                "${{ needs.swift-macos.result }}" != "success" || \
                "${{ needs.kotlin.result }}" != "success" ]]; then
            echo "One or more required CI jobs failed or were cancelled."
            exit 1
          fi
