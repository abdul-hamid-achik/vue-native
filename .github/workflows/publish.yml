name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-main
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # Publish only a successful CI result for a trusted push to main. Manual
  # dispatch remains available from main for deliberate recovery operations.
  release-context:
    name: Release Context
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.head_repository.full_name == github.repository) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    outputs:
      release_sha: ${{ steps.context.outputs.release_sha }}

    steps:
      - name: Resolve validated commit
        id: context
        env:
          RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Verify manual commit passed CI
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ steps.context.outputs.release_sha }}
        run: |
          CI_RUN="$(
            gh run list \
              --workflow CI \
              --commit "$RELEASE_SHA" \
              --event push \
              --status completed \
              --limit 1 \
              --json headSha,conclusion \
              --jq '.[0] | [.headSha, .conclusion] | @tsv'
          )"
          read -r CI_SHA CI_CONCLUSION <<< "$CI_RUN"
          if [ "$CI_SHA" != "$RELEASE_SHA" ] || [ "$CI_CONCLUSION" != "success" ]; then
            echo "No successful CI push run found for $RELEASE_SHA; refusing manual publication."
            exit 1
          fi

  # ── Check if there are changeset changes ────────────────
  changesets:
    name: Changeset Status
    runs-on: ubuntu-latest
    needs: release-context
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.release-context.outputs.release_sha }}
        run: |
          echo "Checking for changesets..."
          mapfile -t CHANGESET_FILES < <(find .changeset -maxdepth 1 -type f -name '*.md' ! -name 'README.md' | sort)

          if [ "${#CHANGESET_FILES[@]}" -eq 0 ]; then
            echo "hasChangesets=false" >> "$GITHUB_OUTPUT"
            echo "No changesets found"
            exit 0
          fi

          echo "hasChangesets=true" >> "$GITHUB_OUTPUT"
          echo "Found ${#CHANGESET_FILES[@]} changeset(s):"
          printf '  %s\n' "${CHANGESET_FILES[@]}"
          # An exact-SHA checkout is detached. Changesets resolves its configured
          # base branch by local name, so anchor that name to the validated SHA.
          git branch --force main "$RELEASE_SHA"
          bun run version:check -- --verbose

  # ── TypeScript validation ────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: release-context

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-1.3.8-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-1.3.8-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Native module contract check
        run: bun run contracts:check

      - name: Build
        run: bun run build

      - name: Smoke-test packed CLI scaffold
        run: bun run smoke:cli

      - name: Test
        run: bun run test:ts

      - name: Dead code check
        run: bun run knip

      - name: Validate Git hooks
        run: bun run hooks:validate

  # ── Native builds validation ─────────────────────────────
  native-builds:
    name: Native Builds
    runs-on: macos-15
    needs: release-context

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint Swift
        run: |
          cd native/ios
          swiftlint lint --reporter github-actions-logging

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
            native/ios/VueNativeCore/.build
            native/shared/VueNativeShared/.build
            native/macos/VueNativeMacOS/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'native/ios/VueNativeCore/Package.swift', 'native/shared/VueNativeShared/Package.swift', 'native/macos/VueNativeMacOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build VueNativeCore for iOS Simulator (in-repo package)
        run: |
          cd native/ios/VueNativeCore
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Validate root Package.swift (consumer-facing SPM target)
        run: |
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Test VueNativeCore
        run: |
          SIMULATOR_ID="$(
            xcrun simctl list devices available -j |
              python3 -c 'import json, sys; devices = json.load(sys.stdin)["devices"].values(); phones = (device for runtime in devices for device in runtime if device.get("isAvailable") and device["name"].startswith("iPhone")); print(next(phones)["udid"])'
          )"
          cd native/ios/VueNativeCore
          xcodebuild test \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=$SIMULATOR_ID" \
            -skipPackagePluginValidation

      - name: Build VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift build

      - name: Test VueNativeShared
        run: |
          cd native/shared/VueNativeShared
          swift test

      - name: Validate root VueNativeMacOS product
        run: swift build --target VueNativeMacOS

      - name: Build VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift build

      - name: Test VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift test

  # ── Android build validation ─────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    needs: release-context

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-context.outputs.release_sha }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('native/android/build.gradle.kts', 'native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Lint Kotlin
        run: ./gradlew :VueNativeCore:ktlintCheck
        working-directory: native/android

      - name: Build VueNativeCore
        run: ./gradlew :VueNativeCore:compileDebugKotlin :VueNativeCore:assembleRelease
        working-directory: native/android

      - name: Test VueNativeCore
        run: ./gradlew :VueNativeCore:testDebugUnitTest :VueNativeCore:testReleaseUnitTest
        working-directory: native/android

  # ── Publish packages (main with changesets) ─────────────
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [release-context, changesets, validate, native-builds, android-build]
    if: needs.changesets.outputs.hasChangesets == 'true'
    permissions:
      contents: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ needs.release-context.outputs.release_sha }}
          fetch-depth: 0

      - name: Verify validated commit is still main
        env:
          RELEASE_SHA: ${{ needs.release-context.outputs.release_sha }}
        run: |
          REMOTE_SHA="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$REMOTE_SHA" != "$RELEASE_SHA" ]; then
            echo "main moved from validated commit $RELEASE_SHA to $REMOTE_SHA; refusing to publish stale code."
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify trusted publishing toolchain
        shell: bash
        run: |
          npm install --global npm@11.18.0
          echo "Node $(node --version)"
          echo "npm v$(npm --version)"

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub OIDC is unavailable. Ensure this job has id-token: write permission."
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump
        id: versioning
        run: |
          bun run version

          if git diff --quiet HEAD -- .; then
            echo "A Changeset was detected, but it produced no version changes. Refusing to publish."
            exit 1
          fi

          if git diff --quiet HEAD -- packages/runtime/package.json; then
            echo "framework_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "framework_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh versioned dependencies
        run: bun install

      - name: Validate versioned packages
        run: bun run check:ts

      - name: Commit version bump
        run: |
          git add .
          if git diff --cached --quiet; then
            echo "Versioning produced no committable changes."
            exit 1
          fi
          git commit -m "chore: bump versions [skip ci]"

      - name: Push version commit
        run: git push origin HEAD:main

      - name: Publish to npm
        run: bun run release

      - name: Setup Java for Android
        if: needs.android-build.result == 'success' && steps.versioning.outputs.framework_changed == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Publish Android to GitHub Packages
        if: needs.android-build.result == 'success' && steps.versioning.outputs.framework_changed == 'true'
        run: |
          ./gradlew :VueNativeCore:publishReleasePublicationToGitHubPackagesRepository
        working-directory: native/android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new version
        id: version
        if: steps.versioning.outputs.framework_changed == 'true'
        run: |
          VERSION=$(node -p "require('./packages/runtime/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Tag release
        if: steps.version.outputs.version != ''
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Extract release notes from CHANGELOG
        id: notes
        if: steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Pull the section for this version from the runtime CHANGELOG
          # (the fixed-group packages share the same version, so any of them works).
          NOTES=$(awk -v ver="## $VERSION" '
            $0 == ver {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' packages/runtime/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          PUBLISHED_PACKAGES="$(
            git diff --name-only HEAD^ HEAD -- 'packages/*/package.json' |
              while IFS= read -r manifest; do
                node -e 'const pkg = require("./" + process.argv[1]); console.log(`- \`${pkg.name}@${pkg.version}\``)' "$manifest"
              done
          )"
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "## Published packages"
            echo "$PUBLISHED_PACKAGES"
            echo "- \`com.vuenative:core:$VERSION\` (GitHub Packages, Maven)"
            echo "RELEASE_NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.version != ''
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "$RELEASE_NOTES" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.notes.outputs.notes }}
