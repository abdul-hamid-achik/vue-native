name: Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # ── Check if there are changeset changes ────────────────
  changesets:
    name: Changeset Status
    runs-on: ubuntu-latest
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for changesets
        id: changesets
        run: |
          echo "Checking for changesets..."
          CHANGESET_COUNT=$(ls -1 .changeset/*.md 2>/dev/null | wc -l)
          if [ "$CHANGESET_COUNT" -gt 0 ]; then
            echo "hasChangesets=true" >> $GITHUB_OUTPUT
            echo "Found $CHANGESET_COUNT changeset(s)"
            bunx changeset status --verbose
          else
            echo "hasChangesets=false" >> $GITHUB_OUTPUT
            echo "No changesets found"
          fi

  # ── TypeScript validation ────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test:ts

  # ── Native builds validation ─────────────────────────────
  native-builds:
    name: Native Builds
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData
            .build
            native/ios/VueNativeCore/.build
            native/shared/VueNativeShared/.build
            native/macos/VueNativeMacOS/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.swift', 'native/ios/VueNativeCore/Package.swift', 'native/shared/VueNativeShared/Package.swift', 'native/macos/VueNativeMacOS/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Build VueNativeCore for iOS Simulator (in-repo package)
        run: |
          cd native/ios/VueNativeCore
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Validate root Package.swift (consumer-facing SPM target)
        run: |
          xcodebuild build \
            -scheme VueNativeCore \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -skipPackagePluginValidation

      - name: Build VueNativeMacOS
        run: |
          cd native/macos/VueNativeMacOS
          swift build

  # ── Android build validation ─────────────────────────────
  android-build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            native/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('native/android/build.gradle.kts', 'native/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build VueNativeCore
        run: ./gradlew :VueNativeCore:assembleRelease
        working-directory: native/android

  # ── Publish packages (only on push to main with changesets) ──
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs: [changesets, validate, native-builds, android-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changesets.outputs.hasChangesets == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version bump
        run: |
          bunx changeset version
          # Check if there are changes to commit
          if git diff --quiet HEAD -- .; then
            echo "No version changes needed"
          else
            git add .
            git commit -m "chore: bump versions [skip ci]"
            git push
          fi

      - name: Build all packages
        run: bun run build

      - name: Publish to npm
        run: bunx changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Setup Java for Android
        if: needs.android-build.result == 'success'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Publish Android to GitHub Packages
        if: needs.android-build.result == 'success'
        run: |
          ./gradlew :VueNativeCore:publishReleasePublicationToGitHubPackagesRepository
        working-directory: native/android
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new version
        id: version
        run: |
          VERSION=$(node -p "require('./packages/runtime/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Tag release
        if: steps.version.outputs.version != ''
        run: |
          git tag -a v${{ steps.version.outputs.version }} -m "Release v${{ steps.version.outputs.version }}"
          git push origin v${{ steps.version.outputs.version }}

      - name: Extract release notes from CHANGELOG
        id: notes
        if: steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Pull the section for this version from the runtime CHANGELOG
          # (the fixed-group packages share the same version, so any of them works).
          NOTES=$(awk -v ver="## $VERSION" '
            $0 == ver {flag=1; next}
            /^## / && flag {exit}
            flag {print}
          ' packages/runtime/CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v$VERSION"
          fi
          {
            echo "notes<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo ""
            echo "## Published packages"
            echo "- \`@thelacanians/vue-native-runtime@$VERSION\`"
            echo "- \`@thelacanians/vue-native-navigation@$VERSION\`"
            echo "- \`@thelacanians/vue-native-vite-plugin@$VERSION\`"
            echo "- \`@thelacanians/vue-native-cli@$VERSION\`"
            echo "- \`com.vuenative:core:$VERSION\` (GitHub Packages, Maven)"
            echo "RELEASE_NOTES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.version.outputs.version != ''
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
